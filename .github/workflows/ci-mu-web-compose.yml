name: Deploy & Test mu-web

# Triggers on any change to the web layer.
# Because the runner IS the production VPS, this workflow builds, deploys,
# and tests in one shot — no separate deploy step needed later.
on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'Web/**'
      - 'docker-compose.local.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Web/**'

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & Deploy ────────────────────────────────────────────────────────
  # Builds the new image and replaces the running mu-web container in place.
  # docker-compose detects the image changed and recreates the container;
  # the old container is stopped automatically before the new one starts.
  deploy:
    runs-on: [self-hosted, windows]

    steps:
      - uses: actions/checkout@v4

      - name: Build mu-web image
        run: docker-compose -f docker-compose.local.yml build mu-web

      - name: Deploy mu-web (replace running container)
        run: docker-compose -f docker-compose.local.yml up -d mu-web

  # ── Test ─────────────────────────────────────────────────────────────────
  # Tests run against the live container on port 8080.
  # The container stays running after tests — it IS the deployment.
  test:
    needs: deploy
    runs-on: [self-hosted, windows]

    steps:
      # Poll until PHP responds — Windows containers take 30-90s to start
      - name: Wait for PHP to be ready
        run: |
          $maxWait  = 180
          $interval = 10
          $elapsed  = 0
          Write-Host "Waiting for http://localhost:8080/health.php (up to ${maxWait}s)..."
          while ($elapsed -lt $maxWait) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8080/health.php" -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200) {
                Write-Host "PHP ready after ${elapsed}s"
                exit 0
              }
            } catch { }
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            Write-Host "  Still waiting... (${elapsed}s)"
          }
          Write-Error "PHP did not respond within ${maxWait}s"
          exit 1

      # ── Test 1: health.php returns 200 ────────────────────────────────────
      - name: Test health endpoint responds
        run: |
          $r = Invoke-WebRequest -Uri "http://localhost:8080/health.php" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Error "Expected 200, got $($r.StatusCode)"; exit 1 }
          Write-Host "health.php returned 200"

      # ── Test 2: all health checks pass ────────────────────────────────────
      - name: Test health response is ok
        run: |
          $r    = Invoke-WebRequest -Uri "http://localhost:8080/health.php" -UseBasicParsing
          $json = $r.Content | ConvertFrom-Json
          Write-Host "Health response: $($r.Content)"
          if ($json.status -ne "ok") {
            Write-Error "Expected status=ok, got: $($json.status)"
            $json.checks.PSObject.Properties | Where-Object { $_.Value -like "failed*" } |
              ForEach-Object { Write-Host "  FAIL $($_.Name): $($_.Value)" }
            exit 1
          }
          Write-Host "All health checks passed"

      # ── Test 3: PHP version present ───────────────────────────────────────
      - name: Test PHP version is reported
        run: |
          $r    = Invoke-WebRequest -Uri "http://localhost:8080/health.php" -UseBasicParsing
          $json = $r.Content | ConvertFrom-Json
          if (-not $json.php) { Write-Error "PHP version missing"; exit 1 }
          Write-Host "PHP version: $($json.php)"

      # ── Test 4: homepage loads ────────────────────────────────────────────
      - name: Test homepage responds
        run: |
          $r = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Error "Homepage returned $($r.StatusCode)"; exit 1 }
          Write-Host "Homepage returned 200"

  # ── Push to GHCR ─────────────────────────────────────────────────────────
  # Only pushes after tests pass and only on real branch pushes (not PRs).
  # The image is already deployed and running — this just archives it to the registry.
  push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, windows]

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag mu-web:latest ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker tag mu-web:latest ghcr.io/${{ github.repository_owner }}/mu-web:latest
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:latest

      - name: Cleanup dangling images
        run: docker image prune -f
