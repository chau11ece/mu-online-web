name: CI - mu-web (docker-compose)

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'Web/**'
      - 'docker-compose.ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Web/**'

# All jobs run on the self-hosted Windows VPS (has Docker + SQL Server)
jobs:
  # ── Stage 1: Validate ─────────────────────────────────────────────────────
  validate:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Validate CI compose file
        run: docker-compose -f docker-compose.ci.yml config

      - name: Check Dockerfile exists
        run: |
          if (!(Test-Path "Web/Dockerfile")) {
            Write-Error "Web/Dockerfile not found!"
            exit 1
          }
          Write-Host "Dockerfile found"

  # ── Stage 2: Build ────────────────────────────────────────────────────────
  build:
    needs: validate
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Build mu-web image
        run: docker-compose -f docker-compose.ci.yml build mu-web

      - name: Tag image for GHCR
        run: |
          docker tag mu-project-mu-web:latest ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker tag mu-project-mu-web:latest ghcr.io/${{ github.repository_owner }}/mu-web:latest

  # ── Stage 3: Test ─────────────────────────────────────────────────────────
  test:
    needs: build
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      # Remove any leftover container from a previous failed run
      - name: Pre-cleanup stale test container
        run: docker rm -f mu-web-ci 2>$null; $true

      - name: Start mu-web container
        run: docker-compose -f docker-compose.ci.yml up -d mu-web

      # Verify the container didn't immediately crash
      - name: Verify container is running
        run: |
          Start-Sleep -Seconds 5
          $state = docker inspect -f '{{.State.Status}}' mu-web-ci
          Write-Host "Container state: $state"
          Write-Host "--- Startup logs ---"
          docker logs mu-web-ci
          Write-Host "--- End logs ---"
          if ($state -ne "running") {
            Write-Error "Container exited immediately (state=$state)"
            exit 1
          }
          Write-Host "Container is running"

      # Poll until PHP responds — Windows containers take 30-90s to start
      - name: Wait for PHP to be ready
        run: |
          $maxWait  = 180
          $interval = 10
          $elapsed  = 0
          Write-Host "Waiting for http://localhost:8089/health.php (up to ${maxWait}s)..."
          while ($elapsed -lt $maxWait) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200) {
                Write-Host "PHP ready after ${elapsed}s"
                exit 0
              }
            } catch { }
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            Write-Host "  Still waiting... (${elapsed}s)"
          }
          Write-Error "PHP did not respond within ${maxWait}s"
          exit 1

      # ── Test 1: health.php returns 200 ────────────────────────────────────
      - name: Test health endpoint responds
        run: |
          $r = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Error "Expected 200, got $($r.StatusCode)"; exit 1 }
          Write-Host "health.php returned 200"

      # ── Test 2: all health checks pass ────────────────────────────────────
      - name: Test health response is ok
        run: |
          $r    = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          $json = $r.Content | ConvertFrom-Json
          Write-Host "Health response: $($r.Content)"
          if ($json.status -ne "ok") {
            Write-Error "Expected status=ok, got: $($json.status)"
            $json.checks.PSObject.Properties | Where-Object { $_.Value -like "failed*" } |
              ForEach-Object { Write-Host "  FAIL: $($_.Name): $($_.Value)" }
            exit 1
          }
          Write-Host "All health checks passed"

      # ── Test 3: PHP version present ───────────────────────────────────────
      - name: Test PHP version is reported
        run: |
          $r    = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          $json = $r.Content | ConvertFrom-Json
          if (-not $json.php) { Write-Error "PHP version missing"; exit 1 }
          Write-Host "PHP version: $($json.php)"

      # ── Test 4: homepage loads ────────────────────────────────────────────
      - name: Test homepage responds
        run: |
          $r = Invoke-WebRequest -Uri "http://localhost:8089" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Error "Homepage returned $($r.StatusCode)"; exit 1 }
          Write-Host "Homepage returned 200"

      # ── Always clean up ───────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker logs mu-web-ci
          docker-compose -f docker-compose.ci.yml down

  # ── Stage 4: Push ─────────────────────────────────────────────────────────
  push:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:latest

      - name: Cleanup old images
        run: docker image prune -f

      - name: Notify success
        run: Write-Host "mu-web pushed to GHCR successfully"
