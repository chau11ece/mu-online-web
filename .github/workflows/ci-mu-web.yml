name: CI - Build mu-web (Windows Container)

on:
  workflow_dispatch:        # allows manual trigger from GitHub Actions UI
  push:
    branches: [ main, develop ]
    paths:
      - 'Web/**'
      - 'Web/Dockerfile'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Web/**'

permissions:
  contents: read
  packages: write

jobs:
  # ── Stage 1: Build ────────────────────────────────────────────────────────
  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mu-web Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }} -f ./Web/Dockerfile ./Web
          docker tag ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/mu-web:latest

  # ── Stage 2: Test ─────────────────────────────────────────────────────────
  test:
    needs: build                          # only runs if build succeeds
    runs-on: [self-hosted, windows]

    steps:
      # Remove any leftover container from a previous failed run
      - name: Pre-cleanup stale test container
        run: |
          try {
            docker rm -f mu-web-test
          } catch {
            Write-Host "No stale container found, skipping cleanup."
          }

      - name: Start mu-web container
        run: |
          docker run -d `
            --name mu-web-test `
            -p 8089:80 `
            -e DB_HOST=192.168.100.96 `
            -e DB_NAME=MuOnline `
            -e DB_USER=sa `
            -e "DB_PASS=Abcd@1234" `
            ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}

      # Poll until health.php responds (IIS can take 60-120s in a Windows container)
      - name: Wait for IIS to be ready
        run: |
          $maxWait  = 120   # seconds
          $interval = 5
          $elapsed  = 0
          Write-Host "Waiting for IIS to start (up to ${maxWait}s)..."
          while ($elapsed -lt $maxWait) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) {
                Write-Host "✅ IIS ready after ${elapsed}s"
                exit 0
              }
            } catch { }
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            Write-Host "  Still waiting... (${elapsed}s elapsed)"
          }
          Write-Error "IIS did not respond within ${maxWait}s"
          exit 1

      # ── Test 1: health.php returns 200 ──────────────────────────────────
      - name: Test health endpoint responds
        run: |
          $response = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          if ($response.StatusCode -ne 200) {
            Write-Error "health.php returned $($response.StatusCode), expected 200"
            exit 1
          }
          Write-Host "✅ health.php responded with 200"

      # ── Test 2: response body says status ok ────────────────────────────
      - name: Test health response body is ok
        run: |
          $response = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          $json = $response.Content | ConvertFrom-Json
          Write-Host "Health response: $($response.Content)"
          if ($json.status -ne "ok") {
            Write-Error "Expected status=ok, got: $($json.status)"
            Write-Host "Failed checks:"
            $json.checks.PSObject.Properties | Where-Object { $_.Value -like "failed*" } | ForEach-Object {
              Write-Host "  ❌ $($_.Name): $($_.Value)"
            }
            exit 1
          }
          Write-Host "✅ All checks passed"

      # ── Test 3: PHP version is present in response ───────────────────────
      - name: Test PHP version is reported
        run: |
          $response = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          $json = $response.Content | ConvertFrom-Json
          if (-not $json.php) {
            Write-Error "PHP version missing from health response"
            exit 1
          }
          Write-Host "✅ PHP version: $($json.php)"

      # ── Test 4: homepage loads (port 80 → IIS works at all) ─────────────
      - name: Test homepage responds
        run: |
          $response = Invoke-WebRequest -Uri "http://localhost:8089" -UseBasicParsing
          if ($response.StatusCode -ne 200) {
            Write-Error "Homepage returned $($response.StatusCode)"
            exit 1
          }
          Write-Host "✅ Homepage responded with 200"

      # ── Always clean up the test container ──────────────────────────────
      - name: Cleanup test container
        if: always()                      # runs even if tests fail
        run: |
          docker logs mu-web-test
          docker stop mu-web-test
          docker rm mu-web-test

  # ── Stage 3: Push ─────────────────────────────────────────────────────────
  push:
    needs: test                           # only pushes if ALL tests pass
    runs-on: [self-hosted, windows]

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:latest

      - name: Cleanup old images
        run: docker image prune -f

      - name: Notify success
        run: Write-Host "✅ mu-web pushed to GHCR successfully!"
        