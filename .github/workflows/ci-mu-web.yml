name: CI - Build mu-web (Windows Container)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Web/**'
      - 'Web/Dockerfile'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Web/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build mu-web Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }} -f ./Web/Dockerfile ./Web
          docker tag ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/mu-web:latest

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:latest

      - name: Cleanup old images
        run: docker image prune -f
