name: CI/CD — mu-web

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'Web/**'
      - 'docker-compose.local.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Web/**'

permissions:
  contents: read
  packages: write

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  # Builds the image locally. No deploy yet — image stays on the runner.
  build:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Build mu-web image
        working-directory: ./Web
        run: docker build -t mu-web:latest .

  # ── 2. Test ───────────────────────────────────────────────────────────────
  # Runs tests against an isolated container on port 8089.
  # Production container on 8080 is completely untouched.
  # If any test fails, push and deploy never run → bad code never reaches prod.
  test:
    needs: build
    runs-on: [self-hosted, windows]
    steps:
      - name: Pre-cleanup stale test container
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          docker rm -f mu-web-test 2>&1 | Out-Null
          $LASTEXITCODE = 0

      - name: Start isolated test container
        run: |
          docker run -d `
            --name mu-web-test `
            -p 8089:80 `
            -e SQL_SERVER=192.168.100.96,1433 `
            -e DB_HOST=192.168.100.96 `
            -e DB_NAME=MuOnline `
            -e DB_USER=sa `
            -e "DB_PASS=Abcd@1234" `
            mu-web:latest

      - name: Verify container started
        run: |
          Start-Sleep -Seconds 5
          $state = docker inspect -f '{{.State.Status}}' mu-web-test
          Write-Host "Container state: $state"
          docker logs mu-web-test
          if ($state -ne "running") { Write-Error "Container exited immediately"; exit 1 }

      - name: Wait for PHP to be ready
        run: |
          $maxWait = 180; $interval = 10; $elapsed = 0
          Write-Host "Polling http://localhost:8089/health.php..."
          while ($elapsed -lt $maxWait) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200) { Write-Host "Ready after ${elapsed}s"; exit 0 }
            } catch { }
            Start-Sleep -Seconds $interval; $elapsed += $interval
            Write-Host "  Waiting... (${elapsed}s)"
          }
          Write-Error "PHP did not respond within ${maxWait}s"; exit 1

      - name: Test health endpoint responds
        run: |
          $r = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Error "Expected 200, got $($r.StatusCode)"; exit 1 }
          Write-Host "health.php 200 OK"

      - name: Test health response is ok
        run: |
          $r    = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          $json = $r.Content | ConvertFrom-Json
          Write-Host "Response: $($r.Content)"
          if ($json.status -ne "ok") {
            Write-Error "Expected status=ok, got: $($json.status)"
            $json.checks.PSObject.Properties | Where-Object { $_.Value -like "failed*" } |
              ForEach-Object { Write-Host "  FAIL $($_.Name): $($_.Value)" }
            exit 1
          }
          Write-Host "All health checks passed"

      - name: Test PHP version is reported
        run: |
          $r    = Invoke-WebRequest -Uri "http://localhost:8089/health.php" -UseBasicParsing
          $json = $r.Content | ConvertFrom-Json
          if (-not $json.php) { Write-Error "PHP version missing"; exit 1 }
          Write-Host "PHP version: $($json.php)"

      - name: Test homepage responds
        run: |
          $r = Invoke-WebRequest -Uri "http://localhost:8089" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Error "Homepage returned $($r.StatusCode)"; exit 1 }
          Write-Host "Homepage 200 OK"

      - name: Cleanup test container
        if: always()
        run: |
          docker logs mu-web-test
          $ErrorActionPreference = 'SilentlyContinue'
          docker rm -f mu-web-test 2>&1 | Out-Null
          $LASTEXITCODE = 0

  # ── 3. Push ───────────────────────────────────────────────────────────────
  # Archives the tested image to GHCR. Only on real branch pushes, not PRs.
  push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, windows]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag mu-web:latest ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker tag mu-web:latest ghcr.io/${{ github.repository_owner }}/mu-web:latest
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/mu-web:latest

      - name: Cleanup dangling images
        run: docker image prune -f

  # ── 4. Deploy ─────────────────────────────────────────────────────────────
  # Replaces the live mu-web container on port 8080 with the tested image.
  # Only runs after push succeeds, and only on main/develop (not PRs).
  # The runner IS the VPS — no SSH needed, just run docker-compose directly.
  deploy:
    needs: push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy mu-web (replace running container)
        run: docker-compose -f docker-compose.local.yml up -d mu-web

      - name: Verify deployment health
        run: |
          $maxWait = 120; $interval = 10; $elapsed = 0
          Write-Host "Waiting for deployed container on http://localhost:8080/health.php..."
          while ($elapsed -lt $maxWait) {
            try {
              $r    = Invoke-WebRequest -Uri "http://localhost:8080/health.php" -UseBasicParsing -TimeoutSec 5
              $json = $r.Content | ConvertFrom-Json
              if ($json.status -eq "ok") {
                Write-Host "Deployment healthy after ${elapsed}s"
                Write-Host $r.Content
                exit 0
              }
            } catch { }
            Start-Sleep -Seconds $interval; $elapsed += $interval
            Write-Host "  Waiting... (${elapsed}s)"
          }
          Write-Error "Deployed container did not become healthy within ${maxWait}s"
          exit 1
