# docker-compose.ci.yml — CI-only compose for testing mu-web in isolation.
# Uses port 8089 to avoid conflict with the production mu-web container on 8080.
# Run manually: docker-compose -f docker-compose.ci.yml up -d mu-web

services:
  mu-web:
    build:
      context: ./Web
    container_name: mu-web-ci
    environment:
      - SQL_SERVER=192.168.100.96,1433
      - DB_HOST=192.168.100.96
      - DB_NAME=MuOnline
      - DB_USER=sa
      - DB_PASS=Abcd@1234
    ports:
      - "8089:80"
