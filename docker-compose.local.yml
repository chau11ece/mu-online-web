# docker-compose.local.yml — Local dev mode (SSH tunnel to prod DB)
# Usage:
#   1. Open tunnel:  ../scripts/dev-tunnel.sh &
#   2. Start:        docker-compose -f docker-compose.local.yml up --build
#   3. Browse:       http://localhost:8080
#
# Connects to MSSQL via SSH tunnel through host.docker.internal

services:

  mu-web:
    build:
      context: ./Web
      dockerfile: Dockerfile.linux
    image: mu-web:dev
    container_name: mu-web-dev
    env_file: .env.dev
    environment:
      - SQL_SERVER=host.docker.internal,1433
      - THEME=Ascendance
    ports:
      - "8080:80"
